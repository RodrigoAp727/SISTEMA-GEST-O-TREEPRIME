<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestão - TREE PRIME</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen" class="login-overlay">
        <div class="login-box">
            <img src="Logo Tree Prime.jpg" alt="Logo Tree Prime" class="login-logo" onerror="this.src='https://via.placeholder.com/100'">
            <h2>Acesso Restrito</h2>
            <input type="text" id="login-usuario" placeholder="Nome de Usuário..." onkeypress="if(event.key === 'Enter') document.getElementById('senha-acesso').focus()">
            <input type="password" id="senha-acesso" placeholder="Sua senha..." onkeypress="if(event.key === 'Enter') verificarSenha()">
            <button onclick="verificarSenha()">Entrar no Sistema</button>
            <p id="login-erro" style="color: #e74c3c; display: none; margin-top: 10px; font-weight: bold;">Usuário ou senha incorretos!</p>
        </div>
    </div>

    <div id="main-app" class="container" style="display: none;">
        <aside class="sidebar">
            <div class="logo-area">
                <img src="Logo Tree Prime.jpg" alt="Logo Tree Prime" class="sidebar-logo" onerror="this.style.display='none'">
            </div>
            <h2>TREE PRIME</h2>
            <nav>
                <button class="menu-btn" onclick="carregarLista('home')">🏠 Início / Dashboard</button>
                <button class="menu-btn" onclick="carregarLista('abertura')">1️⃣ Cadastro de Abertura</button>
                <button class="menu-btn" onclick="carregarLista('ativos')">👥 Clientes Ativos</button>
                <button class="menu-btn" onclick="carregarLista('mensal')">2️⃣ Mensal Contábil</button>
                <button class="menu-btn" onclick="carregarLista('fiscal')">3️⃣ Checklist Fiscal</button>
                <button class="menu-btn" onclick="carregarLista('pessoal')">4️⃣ Depto Pessoal</button>
                <button class="menu-btn" onclick="carregarLista('obrigacoes')">5️⃣ Obrigações Acessórias</button>
                <button id="btn-admin" class="menu-btn" onclick="carregarLista('admin')" style="display: none; background: #8e44ad; margin-top: 20px;">⚙️ Gerenciar Usuários</button>
                <button class="menu-btn" onclick="fazerLogout()" style="background: #c0392b; margin-top: 10px;">🚪 Sair / Bloquear</button>
            </nav>
            <div class="backup-area" id="area-backup-admin" style="display: none;">
                <p>Gestão de Dados</p>
                <button class="backup-btn" onclick="exportarDados()">📤 Exportar Backup</button>
                <button class="backup-btn" onclick="triggerImport()">📥 Importar Backup</button>
                <input type="file" id="file-import" style="display: none;" accept=".json" onchange="importarDados(event)">
            </div>
        </aside>

        <main class="content">
            <header class="header-main">
                <h1 id="titulo-sessao">Painel de Controle</h1>
                <div id="area-busca-clientes" style="display: none;">
                    <div class="search-container">
                        <i class="fas fa-search search-icon"></i>
                        <input type="text" id="busca-cliente" placeholder="Localizar cliente pelo nome..." oninput="atualizarListaClientes(this.value)">
                    </div>
                    <button class="btn-novo" id="btn-novo-cliente" onclick="novoCliente()">➕ Adicionar Novo Cliente</button>
                    <div class="list-header" id="cabecalho-lista" style="display: none;">
                        <span class="col-cliente">Cliente</span>
                        <span class="col-etapa" style="text-align: center;">Fase</span>
                        <span class="col-prioridade" style="text-align: center;">Prioridade</span>
                        <span class="col-status" style="text-align: center;">Status</span>
                    </div>
                    <div id="lista-clientes-salvos" class="client-list"></div>
                </div>
            </header>
            <div id="dashboard-area" style="display: none;"></div>
            <div id="lista-tarefas" class="task-grid"></div>
            <div id="acoes-sistema" class="acoes-container" style="display: none;">
                <button class="pdf-btn" onclick="gerarPDF()">📑 PDF</button>
                <button class="save-btn" id="btn-salvar" onclick="salvarChecklist()">💾 Salvar</button>
                <button class="update-btn" id="btn-atualizar" onclick="atualizarCliente()">🔄 Atualizar</button>
                <button class="concluir-btn" id="btn-concluir" onclick="concluirProcesso()">✅ Concluir</button>
                <button class="reabrir-btn" id="btn-reabrir" onclick="reabrirProcesso()">⏪ Reabrir</button>
                <button class="delete-btn" id="btn-excluir-admin" onclick="excluirCliente()" style="display: none;">🗑️ Excluir</button>
            </div>
        </main>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
